<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600');
      .logo {
        font-family: 'Cinzel', Georgia, serif;
        font-size: 130px;
        font-weight: 600;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        fill: #a07050;
      }
    </style>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#6f4d38" flood-opacity="0.50" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#1c2a38" rx="0" />
  <text x="48.5%" y="54%" text-anchor="middle" dominant-baseline="middle" class="logo" filter="url(#glow)">VEXTRA</text>
</svg>
